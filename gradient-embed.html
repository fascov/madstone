<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shader Gradient Background</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1?bundle",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?bundle",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?bundle&external=react",
        "three": "https://esm.sh/three@0.154.0?bundle",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.19?bundle&external=react,three",
        "shadergradient": "https://esm.sh/shadergradient@1.3.5?bundle&external=react,three,@react-three/fiber"
      }
    }
  </script>
  
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { ShaderGradientCanvas, ShaderGradient } from 'shadergradient';

    function App() {
      return React.createElement(
        ShaderGradientCanvas,
        {
          style: {
            position: 'absolute',
            top: 0,
            left: 0,
            width: '100%',
            height: '100%',
            pointerEvents: 'none'
          },
          pixelDensity: 0.8,
          fov: 45
        },
        React.createElement(ShaderGradient, {
          animate: "on",
          brightness: 0.8,
          cAzimuthAngle: 180,
          cDistance: 6,
          cPolarAngle: 90,
          cameraZoom: 0.8,
          color1: "#082b08",
          color2: "#113211",
          color3: "#176100",
          envPreset: "city",
          fov: 45,
          grain: "on",
          lightType: "env",
          pixelDensity: 0.8,
          positionX: -1.2,
          positionY: 0.3,
          positionZ: -1.8,
          reflection: 0.05,
          rotationX: 0,
          rotationY: 0,
          rotationZ: 70,
          type: "plane",
          uAmplitude: 1,
          uDensity: 5.1,
          uFrequency: 5.3,
          uSpeed: 0.15,
          uStrength: 0.8,
          wireframe: false
        })
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
